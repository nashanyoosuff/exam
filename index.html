<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT EXAM - Result Sheet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .search-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #1a5276; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #27ae60; }
        
        /* சிவப்பு நிற எச்சரிக்கை செய்திப் பகுதி */
        .error-message {
            color: #c0392b; 
            background-color: #f9ebd2; 
            border: 1px solid #e74c3c; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 15px; 
            display: none; 
            text-align: center; 
            font-weight: bold;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h2>ICT EXAM</h2>
        <input type="text" id="nicInput" placeholder="N.I.C Number">
        <button onclick="searchStudent()">Enter</button>
        
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
